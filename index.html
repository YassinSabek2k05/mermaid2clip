<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mermaid → Clipboard</title>
<style>
  :root{
    --ink:#1C2B4A;
    --ink-2:#243459;
    --rust:#CB5A2B;
    --rust-2:#E17041;
    --paper:#F4F5F7;
    --line:#33456f;
    --ok:#4CA36A;
    --err:#D9534F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--ink);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--paper);
    display:flex;
    flex-direction:column;
    min-height:100%;
  }
  header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0;
    font-size:1.15rem;
    font-weight:700;
    letter-spacing:0.2px;
  }
  header h1 span{color:var(--rust-2);}
  header p{
    margin:4px 0 0;
    font-size:0.8rem;
    color:#9fb0d1;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:16px 20px 24px;
    gap:14px;
    max-width:760px;
    width:100%;
    margin:0 auto;
  }
  textarea{
    width:100%;
    min-height:150px;
    background:var(--ink-2);
    color:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:0.85rem;
    line-height:1.5;
    resize:vertical;
  }
  textarea:focus{
    outline:none;
    border-color:var(--rust-2);
  }
  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  button{
    appearance:none;
    border:1px solid var(--line);
    background:var(--ink-2);
    color:var(--paper);
    padding:10px 16px;
    border-radius:8px;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
  }
  button:active{transform:translateY(1px);}
  button.primary{
    background:var(--rust);
    border-color:var(--rust);
    color:#fff;
  }
  button.primary:hover{background:var(--rust-2);}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  #status{
    font-size:0.8rem;
    min-height:1.1em;
  }
  #status.ok{color:var(--ok);}
  #status.err{color:#ff9d90;}
  #preview-wrap{
    background:#fff;
    border-radius:10px;
    padding:16px;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:auto;
  }
  #preview svg{max-width:100%;height:auto;}
  #preview-placeholder{
    color:#7c8aa8;
    font-size:0.85rem;
  }
  footer{
    padding:12px 20px 20px;
    text-align:center;
    font-size:0.72rem;
    color:#66759b;
  }
</style>
</head>
<body>

<header>
  <h1>Mermaid <span>→</span> Clipboard</h1>
  <p>Paste diagram code, render it, copy the image. No install, no server.</p>
</header>

<main>
  <textarea id="code" spellcheck="false">flowchart LR
    A[Sensor] --> B[Ingestion]
    B --> C{Valid?}
    C -->|Yes| D[(TimescaleDB)]
    C -->|No| E[Dead letter]</textarea>

  <div class="row">
    <button class="primary" id="renderBtn">Render</button>
    <button id="pasteBtn">Paste code</button>
    <button id="copyBtn" disabled>Copy image</button>
    <button id="downloadBtn" disabled>Download PNG</button>
  </div>

  <div id="status"></div>

  <div id="preview-wrap">
    <div id="preview"></div>
    <div id="preview-placeholder">Rendered diagram appears here</div>
  </div>
</main>

<footer>Runs entirely in-browser. Add to home screen for app-like use.</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

  const codeEl = document.getElementById('code');
  const renderBtn = document.getElementById('renderBtn');
  const pasteBtn = document.getElementById('pasteBtn');
  const copyBtn = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusEl = document.getElementById('status');
  const preview = document.getElementById('preview');
  const placeholder = document.getElementById('preview-placeholder');

  let lastBlob = null;
  let renderCount = 0;

  function setStatus(msg, kind) {
    statusEl.textContent = msg;
    statusEl.className = kind || '';
  }

  async function renderDiagram() {
    const code = codeEl.value.trim();
    if (!code) { setStatus('Nothing to render.', 'err'); return; }
    setStatus('Rendering…');
    copyBtn.disabled = true;
    downloadBtn.disabled = true;
    lastBlob = null;
    try {
      const id = 'mmd-' + (renderCount++);
      const { svg } = await mermaid.render(id, code);
      preview.innerHTML = svg;
      placeholder.style.display = 'none';
      await prepareBlob();
      setStatus('Rendered. Ready to copy.', 'ok');
      copyBtn.disabled = false;
      downloadBtn.disabled = false;
    } catch (e) {
      preview.innerHTML = '';
      placeholder.style.display = 'block';
      setStatus('Mermaid error: ' + (e.message || e), 'err');
    }
  }

  function prepareBlob() {
    return new Promise((resolve, reject) => {
      const svgEl = preview.querySelector('svg');
      if (!svgEl) return reject('No SVG rendered');

      let bbox;
      try { bbox = svgEl.getBBox(); }
      catch { bbox = { x: 0, y: 0, width: svgEl.clientWidth || 600, height: svgEl.clientHeight || 400 }; }

      const pad = 24;
      const w = Math.max(bbox.width + pad * 2, 10);
      const h = Math.max(bbox.height + pad * 2, 10);

      const clone = svgEl.cloneNode(true);
      clone.setAttribute('width', w);
      clone.setAttribute('height', h);
      clone.setAttribute('viewBox', `${bbox.x - pad} ${bbox.y - pad} ${w} ${h}`);
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

      const svgData = new XMLSerializer().serializeToString(clone);
      // Data URI instead of a blob: URL — blob: URLs get treated as tainted
      // cross-origin resources when the page itself is opened via file://,
      // which makes canvas.toBlob() throw. Data URIs don't have that problem.
      const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);

      const img = new Image();
      img.onload = () => {
        const scale = 2;
        const canvas = document.createElement('canvas');
        canvas.width = w * scale;
        canvas.height = h * scale;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => {
          if (!blob) return reject('Canvas export failed');
          lastBlob = blob;
          resolve();
        }, 'image/png');
      };
      img.onerror = () => { reject('Image load failed'); };
      img.src = dataUrl;
    });
  }

  async function copyImage() {
    if (!lastBlob) { setStatus('Render a diagram first.', 'err'); return; }
    try {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': lastBlob })
      ]);
      setStatus('Image copied to clipboard.', 'ok');
    } catch (e) {
      setStatus('Clipboard write blocked (needs HTTPS + permission). Use Download instead.', 'err');
    }
  }

  function downloadImage() {
    if (!lastBlob) return;
    const url = URL.createObjectURL(lastBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'diagram.png';
    a.click();
    URL.revokeObjectURL(url);
  }

  async function pasteCode() {
    try {
      const text = await navigator.clipboard.readText();
      if (text) { codeEl.value = text; setStatus('Pasted from clipboard.', 'ok'); }
    } catch (e) {
      setStatus('Clipboard read blocked — paste manually.', 'err');
    }
  }

  renderBtn.addEventListener('click', renderDiagram);
  copyBtn.addEventListener('click', copyImage);
  downloadBtn.addEventListener('click', downloadImage);
  pasteBtn.addEventListener('click', pasteCode);

  renderDiagram();
</script>
</body>
</html>
